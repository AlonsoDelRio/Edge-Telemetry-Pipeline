apiVersion: 1

datasources:
  - name: InfluxDB - Simulator
    type: influxdb
    uid: influxdb-sim          # Stable UID — referenced by dashboard JSON
    access: proxy              # Grafana backend proxies requests to InfluxDB
    url: http://influxdb:8086  # Docker service name resolution
    jsonData:
      version: Flux            # Use Flux query language (InfluxDB 2.x native)
      organization: ${INFLUXDB_ORG}
      defaultBucket: ${INFLUXDB_BUCKET_SIM}
    secureJsonData:
      token: ${INFLUXDB_TOKEN}
    isDefault: false
    editable: false            # Lock in UI — config lives here, not in the DB

  - name: InfluxDB - Hardware
    type: influxdb
    uid: influxdb-hw           # Stable UID — referenced by dashboard JSON
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: ${INFLUXDB_ORG}
      defaultBucket: ${INFLUXDB_BUCKET_HW}
    secureJsonData:
      token: ${INFLUXDB_TOKEN}
    isDefault: true            # Default datasource for new panels
    editable: false